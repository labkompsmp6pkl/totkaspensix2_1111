
<!DOCTYPE html>
<html lang="id" class="h-full w-full p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Akademik - SMPN 06 Pekalongan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/css">
      /* Global Resets & Typography Scale Down */
      html { font-size: 14px; } /* Slightly smaller base for elegance */
      
      body, #root {
        width: 100vw !important;
        min-width: 100vw !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
        background-color: #fcfdfe;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      #root { display: flex; flex-direction: column; min-height: 100vh; }

      /* Scrollbar Aesthetics */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      
      /* Animation Utilities */
      .animate-in {
        animation-duration: 0.4s;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: both;
      }
      @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .fade-up { animation-name: fade-up; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Avoid content being hidden behind fixed navbar */
      main { position: relative; }
    </style>
    <script>
      // Persistent Iframe Resize Force for AI Studio
      if (window.parent !== window) {
        setInterval(() => {
          if (document.body) {
            document.body.style.width = '100vw';
            document.documentElement.style.width = '100vw';
          }
        }, 500);
      }
    </script>
